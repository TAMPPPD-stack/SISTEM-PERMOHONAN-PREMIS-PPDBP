                     <td className="px-5 py-4 font-bold text-slate-700">{log.user}</td>
                     <td className="px-5 py-4"><span className="bg-cyan-50 border border-cyan-100 text-cyan-700 px-2.5 py-1 rounded-md text-xs font-bold">{log.action}</span></td>
                     <td className="px-5 py-4 text-slate-500 font-medium">{log.details}</td>
                   </tr>
                 ))}
                 {auditLogs.length === 0 && <tr><td colSpan="4" className="text-center py-8 text-slate-400 font-medium">Laluan log trafik kosong pada ketika ini.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );

      const AdminUsersList = () => (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-400 to-cyan-500"></div>
          <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3"><i className="fas fa-users text-cyan-500"></i> Pangkalan Data Pengguna</h2>
          
          <div className="bg-blue-50 border border-blue-100 text-blue-700 p-4 rounded-xl mb-6 text-sm flex items-start gap-3">
            <i className="fas fa-exclamation-circle mt-1"></i>
            <p><strong>Perhatian Pentadbir:</strong> Ruangan ini merekodkan senarai ID dan Kata Laluan yang didaftarkan oleh pemohon untuk tujuan rekod dan rujukan semakan keselamatan anda.</p>
          </div>

          <div className="overflow-x-auto">
            <table className="min-w-full text-sm divide-y divide-slate-100 border border-slate-100 rounded-xl">
              <thead className="bg-slate-50">
                <tr>
                  <th className="px-5 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Nama & Emel</th>
                  <th className="px-5 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">ID Pengguna (Username)</th>
                  <th className="px-5 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Kata Laluan (Password)</th>
                  <th className="px-5 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Tarikh Daftar</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50 bg-white">
                 {users.map((u, i) => (
                   <tr key={i} className="hover:bg-cyan-50/30 transition-colors">
                     <td className="px-5 py-4">
                        <div className="font-bold text-slate-800">{u.nama}</div>
                        <div className="text-xs text-slate-500 mt-0.5">{u.emel}</div>
                     </td>
                     <td className="px-5 py-4 font-mono font-bold text-cyan-700 bg-cyan-50/50">{u.id}</td>
                     <td className="px-5 py-4 font-mono text-rose-600 bg-rose-50/50">{u.pass}</td>
                     <td className="px-5 py-4 text-slate-500 text-xs font-medium">{u.tarikhDaftar}</td>
                   </tr>
                 ))}
              </tbody>
            </table>
          </div>
        </div>
      );

      if (!isAuthenticated) return <LoginScreen />;

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
          <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm z-40 sticky top-0">
            <div className="max-w-[90rem] mx-auto px-4 py-3 md:py-4 flex justify-between items-center">
              <div className="flex items-center gap-4">
                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden text-slate-600 hover:text-cyan-600 transition-colors"><i className="fas fa-bars text-xl"></i></button>
                <img src="https://i.postimg.cc/4NcXx1NT/LOGO-PPDBP-FONT-HITAM.png" className="h-10 sm:h-12 md:h-14 drop-shadow-sm" alt="Logo" />
                <div className="hidden sm:block border-l-2 h-10 mx-3 border-slate-200"></div>
                <div>
                  <h1 className="font-black text-lg md:text-xl text-slate-800 tracking-tight uppercase">Sistem Tempahan Premis</h1>
                </div>
              </div>
              <div className="flex items-center gap-4">
                 <div className="hidden md:flex items-center gap-2 text-sm font-bold text-slate-700 bg-slate-100 px-4 py-2 rounded-xl border border-slate-200">
                   <i className="fas fa-user text-cyan-600"></i> <span>{currentUser.nama}</span>
                 </div>
                 <button onClick={handleLogout} title="Putus Talian" className="p-2.5 rounded-xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-100 transition-all shadow-sm">
                   <i className="fas fa-sign-out-alt text-lg"></i>
                 </button>
              </div>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden relative max-w-[90rem] w-full mx-auto">
            <aside className={`${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 w-64 flex-shrink-0 bg-[#0B1727] shadow-2xl z-50 transition-transform duration-300 ease-in-out overflow-y-auto border-r border-slate-800`}>
              <div className="h-full flex flex-col p-5">
                <nav className="space-y-2 flex-1 mt-2">
                  {role === 'user' && (
                    <>
                      <button onClick={() => {setView('form'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'form' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-plus-circle"></i> Tiket Tempahan</button>
                      <button onClick={() => {setView('user-dashboard'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'user-dashboard' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-home"></i> Hab Induk</button>
                      <button onClick={() => {setView('calendar'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'calendar' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-calendar-alt"></i> Kalendar Visual</button>
                    </>
                  )}
                  {role === 'admin' && (
                    <>
                      <button onClick={() => {setView('admin-dashboard'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'admin-dashboard' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-home"></i> Papan Pemuka</button>
                      <button onClick={() => {setView('form'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'form' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-plus-circle"></i> Modul Cipta</button>
                      <button onClick={() => {setView('admin-list'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'admin-list' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-file-alt"></i> Pusat Kawalan</button>
                      <button onClick={() => {setView('admin-block'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'admin-block' ? 'bg-gradient-to-r from-gray-600 to-gray-800 text-white shadow-[0_0_15px_rgba(31,41,55,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-lock"></i> Sekatan Premis</button>
                      <button onClick={() => {setView('calendar'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'calendar' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-calendar-alt"></i> Peta Kalendar</button>
                      <button onClick={() => {setView('admin-users'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'admin-users' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-users"></i> Akaun Pengguna</button>
                      <button onClick={() => {setView('audit'); setSidebarOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${view === 'audit' ? 'bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-[0_0_15px_rgba(6,182,212,0.4)]' : 'text-slate-400 hover:bg-slate-800/50 hover:text-cyan-300'}`}><i className="fas fa-shield-alt"></i> Jejak Keselamatan</button>
                    </>
                  )}
                </nav>
                <div className="border-t border-slate-800/50 pt-5 mt-auto">
                  <div className="bg-slate-800/30 rounded-xl p-3 flex items-center justify-center gap-2 border border-slate-700/50 shadow-inner">
                     <div className="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)] animate-pulse"></div>
                     <span className="text-[11px] font-bold tracking-widest text-cyan-100 uppercase">Status: Bersambung ke Firebase</span>
                  </div>
                </div>
              </div>
            </aside>

            <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50">
              <div className="max-w-5xl mx-auto h-full animate-slide-up">
                {view === 'user-dashboard' && <DashboardUser />}
                {view === 'admin-dashboard' && <DashboardAdmin />}
                {view === 'form' && <BookingForm />}
                {view === 'admin-block' && <AdminBlockForm />}
                {view === 'admin-list' && <AdminList />}
                {view === 'calendar' && <CalendarView />}
                {view === 'audit' && <AuditLogView />}
                {view === 'admin-users' && <AdminUsersList />}
              </div>
            </main>
          </div>

          {sidebarOpen && <div className="fixed inset-0 bg-[#0B1727]/80 z-40 md:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>}

          <TelegramToast messages={telegramMsgs} removeMessage={(id) => setTelegramMsgs(prev => prev.filter(m => m.id !== id))} />

          {dialogConfig.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-4 backdrop-blur-md">
              <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-[0_20px_50px_rgba(6,182,212,0.15)] relative overflow-hidden animate-slide-up border border-slate-100">
                <div className={`absolute top-0 left-0 w-full h-1.5 ${dialogConfig.type.includes('tolak') || dialogConfig.type.includes('batal') ? 'bg-rose-500' : 'bg-gradient-to-r from-teal-400 to-cyan-500'}`}></div>
                <h3 className="font-black text-xl mb-3 text-slate-800 flex items-center gap-3">
                  <i className={dialogConfig.type.includes('tolak') || dialogConfig.type.includes('batal') ? 'fas fa-exclamation-circle text-rose-500' : 'fas fa-exclamation-circle text-cyan-500'}></i>
                  {dialogConfig.title}
                </h3>
                <p className="text-slate-500 text-sm font-medium mb-6 leading-relaxed">{dialogConfig.message}</p>
                
                {(dialogConfig.type === 'confirm-tolak' || dialogConfig.type === 'confirm-batal' || dialogConfig.type === 'confirm-batal-user') && (
                  <textarea 
                    autoFocus
                    className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 mb-6 focus:ring-2 focus:ring-cyan-500/30 focus:border-cyan-500 focus:outline-none transition-all text-sm" 
                    rows="3" placeholder={dialogConfig.type === 'confirm-batal-user' ? "Sebab pembatalan tempahan..." : "Perekodan Alasan Siber..."} id="reason-input"
                  ></textarea>
                )}

                <div className="flex justify-end gap-3 mt-2">
                  <button onClick={closeDialog} className="px-5 py-2.5 rounded-xl text-slate-500 hover:bg-slate-100 font-bold text-sm transition-colors">Tutup</button>
                  
                  {dialogConfig.type === 'alert' && dialogConfig.action && (
                    <button onClick={() => { dialogConfig.action(); closeDialog(); }} className="px-5 py-2.5 bg-gradient-to-r from-teal-500 to-cyan-500 text-white rounded-xl hover:from-teal-400 hover:to-cyan-400 font-bold text-sm shadow-[0_4px_10px_rgba(6,182,212,0.3)] transition-all">Persetujuan Terus</button>
                  )}
                  {dialogConfig.type === 'alert' && !dialogConfig.action && (
                     <button onClick={closeDialog} className="px-5 py-2.5 bg-slate-800 text-white rounded-xl hover:bg-slate-700 font-bold text-sm shadow-md transition-all">Kembali</button>
                  )}
                  
                  {(dialogConfig.type === 'confirm-tolak' || dialogConfig.type === 'confirm-batal' || dialogConfig.type === 'confirm-batal-user') && (
                    <button onClick={() => {
                      const reason = document.getElementById('reason-input').value;
                      if(!reason) { alert("Pengisian alasan diwajibkan oleh pangkalan data."); return; }
                      
                      const isUserAction = dialogConfig.type === 'confirm-batal-user';
                      const finalReason = isUserAction ? `Dibatalkan oleh Pemohon: ${reason}` : reason;
                      const statusToUpdate = dialogConfig.type === 'confirm-tolak' ? 'Ditolak' : 'Dibatalkan';
                      
                      updateBookingStatus(dialogConfig.id, statusToUpdate, finalReason, isUserAction);
                    }} className="px-5 py-2.5 bg-rose-500 text-white rounded-xl hover:bg-rose-400 font-bold text-sm shadow-[0_4px_10px_rgba(244,63,94,0.3)] transition-all">Sahkan Perintah Eksekusi</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
